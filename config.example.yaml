telegram:
  # Create a bot via @BotFather on Telegram and paste the token here
  bot_token: "YOUR_BOT_TOKEN"
  # Your Telegram user ID (send /start to @userinfobot to find it)
  owner_id: 123456789

claude:
  # Model: opus, sonnet, haiku, or a full model ID
  model: "opus"
  # Permission mode for tool execution
  permission_mode: "bypassPermissions"
  # Allowed tools (empty = all tools enabled)
  allowed_tools: []
  # System prompt appended to every session
  system_prompt: |
    You are a personal AI assistant accessible via Telegram.
    You have full access to the filesystem, shell, and web.
    Be concise in your responses.

    To schedule a recurring task:
    <!--SCHEDULE:{"name":"task-name","prompt":"what to do","cron":"0 8 * * *"}-->

    To schedule a one-shot reminder:
    <!--REMIND:{"prompt":"what to do","delay":"2h"}-->

    To delegate a complex task to a full interactive Claude session:
    <!--DELEGATE:{"task":"detailed description","timeout":600}-->
  # Files appended to system prompt (read fresh each invocation)
  system_prompt_files:
    - "{{AGENT_ROOT}}/workspace/self-improving/memory.md"
  # Max agentic turns per invocation
  max_turns: 50
  # Timeout in seconds for each claude invocation
  timeout: 300
  # Optional: path to MCP server config JSON file
  # mcp_config: "/path/to/mcp.json"

# Optional: Slack monitoring
# slack:
#   enabled: true
#   bot_token: "xoxb-..."
#   app_token: "xapp-..."
#   triage_interval: 900
#   channels:
#     "#general":
#       enabled: true
#       requireMention: false

# Claude Code tmux agents for task delegation
# The first agent is the default target for DELEGATE blocks.
# The workspace agent shares the same CLAUDE.md and context as the bot —
# use it for deep work, planning, browser automation, anything that needs
# more than the bot's 300s timeout.
cc_agents:
  - name: "{{AGENT_NAME}}-workspace"
    tmux_session: "{{AGENT_NAME}}-workspace"
    working_dir: "{{AGENT_ROOT}}/workspace"
    # permission_mode: "dangerously-skip-permissions"  # default
    # resume: true          # resume prior Claude session on tmux recreation (default: true)
  # Additional agents (add as needed):
  # - name: "{{AGENT_NAME}}-code"
  #   tmux_session: "{{AGENT_NAME}}-code"
  #   working_dir: "{{AGENT_ROOT}}/coding"
  # - name: "research"
  #   tmux_session: "research"
  #   working_dir: "{{AGENT_ROOT}}/research"
  #   resume: false          # start fresh every time

scheduler:
  # Seed jobs — merged into scheduler-jobs.json on first run, then managed dynamically.
  # The agent can create/modify jobs at runtime via SCHEDULE blocks.
  # Config seeds only run once — editing here after first run has no effect.
  # To modify a running job, use /cancel then /schedule, or have the agent emit a SCHEDULE block.
  jobs:
    - name: "heartbeat"
      prompt: "Read the HEARTBEAT.md in your workspace and follow its instructions."
      cron: "25 */2 * * *"
  # More examples:
  # - name: "research-digest"
  #   prompt: "Check AI news sources and summarize what's new."
  #   cron: "0 7 * * *"
  #   session: "research"      # optional: isolate this job's context from the main chat

# Voice input (Phase 1 — transcription of Telegram voice messages).
# Install: uv sync --extra voice    (pulls faster-whisper)
# Engines are pluggable — see assistant/voice/engines/ for examples and to add new ones.
voice:
  enabled: false               # toggle voice handling on/off
  engine: faster_whisper       # registry name; available: faster_whisper, whisper_cpp, openai_api
  model: base.en               # engine-specific model identifier
  language: en                 # ISO code; null for auto-detect
  engine_options:
    compute_type: int8         # faster-whisper: int8 | int8_float16 | float16 | float32
    device: cpu                # 'cpu' (recommended) or 'cuda'

  # Examples for other engines:
  #
  # engine: whisper_cpp
  # model: base.en
  # engine_options:
  #   model_path: /opt/homebrew/share/whisper-cpp/ggml-base.en.bin   # REQUIRED
  #   binary: whisper-cli                                            # optional override
  #   threads: 4
  #
  # engine: openai_api
  # model: whisper-1
  # engine_options:
  #   api_key: ${OPENAI_API_KEY}
